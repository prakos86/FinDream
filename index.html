<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FinDream - Finanzas para tus Sueños</title>
    
    <!-- Configuración de PWA e iOS Móvil -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#008B81" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Soporte específico e instalación en iPhone (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinDream" />
    
    <!-- Favicon e Iconos Apple de Lanzamiento -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>
  <body class="bg-slate-50 antialiased select-none font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('PWA Service Worker listo y registrado con éxito!', reg.scope);
              
              // Force checking for updates immediately to bypass Chrome's default delay
              reg.update();
              
              // If there is an updated service worker waiting, tell the user or auto-reload
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New content is available; reload page
                      console.log('Nueva versión disponible, recargando...');
                      window.location.reload();
                    }
                  });
                }
              });
            })
            .catch(err => {
              console.warn('Registro de Service Worker cancelado o no disponible:', err);
            });
        });

        // Add an automatic controller change listener to reload when the active service worker changes
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
